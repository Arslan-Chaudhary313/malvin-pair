<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ᴍᴀ𝐫𝐜-𝐦𝐝 PAIRING</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("https://files.catbox.moe/qyogy8.jpg");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 320px;
      padding: 25px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid #00ffcc;
    }

    #text { color: #000; }

    .input-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .input-container input {
      border-radius: 8px;
      background: #f0f0f0;
      padding: 12px;
      border: 2px solid #ddd;
      color: #333;
      font-size: 16px;
      text-align: center;
      transition: all 0.3s;
    }

    .input-container input:focus {
      border-color: #00ffcc;
      outline: none;
      background: #fff;
    }

    .input-container button {
      padding: 12px;
      background: linear-gradient(135deg, #00ffcc 0%, #33ccff 100%);
      font-weight: bold;
      text-transform: uppercase;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .input-container button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
    }

    .centered-text {
      text-align: center;
      font-weight: 600;
    }
    
    .glowing-text {
      margin-top: 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 10px #00ffcc;
      animation: glow 3s infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 10px #00ffcc; }
      50% { text-shadow: 0 0 20px #33ccff, 0 0 30px #00ffcc; }
    }

    #copy {
        cursor: pointer;
        padding: 10px;
        background: #e8fdf9;
        border-radius: 5px;
        display: inline-block;
        border: 1px dashed #00ffcc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box" id="box">
      <div id="text">
        <i class="fa fa-shield-halved" style="font-size: 40px; color: #00ffcc;"></i>
        <h2 class="centered-text">ᴍᴀ𝐫𝐜-𝐦𝐝 PAIRING</h2>           
        <p style="font-size: 13px; color: #666;">Enter your number with country code<br>(e.g. 923309341706)</p>
        
        <div class="input-container">
          <input placeholder="923309341706" type="number" id="number">
          <button id="submit">GENERATE CODE</button>
        </div>
       
        <br>
        <main id="pair"></main>
      </div>
    </div>
    <div class="glowing-text">Powered By 𝐀𝐫𝐬𝐥𝐚𝐧 𝐂𝐡𝐚𝐮𝐝𝐡𝐚𝐫𝐲 👑</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let codeSpan = document.getElementById("code-value");
      let originalText = codeSpan.innerText;
      await navigator.clipboard.writeText(originalText);
      
      let copyContainer = document.getElementById("copy");
      copyContainer.innerHTML = '<span style="color:blue">COPIED!</span>';
      
      setTimeout(() => {
        copyContainer.innerHTML = 'CODE: <span id="code-value" style="color:black;font-weight:bold">' + originalText + '</span>';
      }, 1000);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      const numValue = c.value.trim();

      if (!numValue) {
        a.innerHTML = '<span style="color:red; font-size:12px;">❗ Please enter your number.</span>';
        return;
      }

      a.innerHTML = '<span style="color:black;font-weight:bold">🔍 Requesting Code...</span>';
      
      try {
        let { data } = await axios(`/code?number=${numValue}`);
        let code = data.code || "Error";
        
        if (code === "Error" || code.includes("Service")) {
            a.innerHTML = '<span style="color:red;font-weight:bold">❌ Service Unavailable. Try again.</span>';
        } else {
            a.innerHTML = '<div id="copy" onclick="Copy()">CODE: <span id="code-value" style="color:black;font-weight:bold">' + code + '</span></div><br><p style="font-size:11px; color: #888;">Click the code to copy</p>';
        }
      } catch (err) {
        a.innerHTML = '<span style="color:red;font-weight:bold">❌ Server Connection Failed.</span>';
      }
    });
  </script>
</body>
</html>
