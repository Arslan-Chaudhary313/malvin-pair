  <style>
    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: Arial, sans-serif;
    }

    .button-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h3 {
      margin-top: -20px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeIn 2s forwards;
      letter-spacing: 2px;
      color: #00ffcc;
    }

    .button {
      width: 200px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      background-color: #111;
      border-radius: 10px;
      border: none;
      color: white;
      position: relative;
      cursor: pointer;
      font-weight: 700;
      transition-duration: .3s;
      text-decoration: none;
      z-index: 1;
    }

    .button:hover {
        transform: scale(1.05);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #111;
      color: #fff;
      padding: 15px 0;
      text-align: center;
      font-size: 14px;
      border-top: 1px solid #333;
    }

    /* Neon Border Effect */
    .button:before, .button:after {
      content: '';
      position: absolute;
      left: -2px;
      top: -2px;
      border-radius: 10px;
      background: linear-gradient(45deg, #00ffcc, #33ccff, #00ffcc, #33ccff);
      background-size: 400%;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      z-index: -1;
      animation: steam 10s linear infinite;
    }

    @keyframes steam {
      0% { background-position: 0 0; }
      50% { background-position: 400% 0; }
      100% { background-position: 0 0; }
    }

    .button:after {
      filter: blur(15px);
      opacity: 0.7;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    p {
        font-size: 12px;
        color: #888;
        margin: 10px 0;
    }
  </style>
